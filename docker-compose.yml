services:
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./AuthGuard/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - authguard
      - user-service
    networks:
      - authguard-network
    profiles:
      - prod
      - dev
      - local

  authguard:
    build: 
      context: ./AuthGuard
      dockerfile: Dockerfile
    container_name: authguard
    ports:
      - "3000:3000"
    env_file: ./AuthGuard/.env
    depends_on:
      - redis
      - keycloak
    networks:
      - authguard-network
    profiles:
      - prod

  authguard-dev:
    build: 
      context: ./AuthGuard
      dockerfile: Dockerfile.dev
    container_name: authguard_dev
    ports:
      - "3000:3000"
    env_file: ./AuthGuard/.env
    volumes:
      - ./AuthGuard/src:/app/src
      - ./AuthGuard/Cargo.toml:/app/Cargo.toml
      - ./AuthGuard/Cargo.lock:/app/Cargo.lock
    depends_on:
      - redis
      - keycloak
    networks:
      - authguard-network
    profiles:
      - dev

  user-service:
    image: node:18-alpine
    container_name: user_service
    command: sh -c "echo 'const http = require(\"http\"); http.createServer((req, res) => { res.end(\"OK\"); }).listen(4001);' > server.js && node server.js"
    networks:
      - authguard-network
    profiles:
      - prod
      - dev
      - local

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: keycloak_auth
    command: start-dev --import-realm
    env_file: ./AuthGuard/.env
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
      - JAVA_OPTS_APPEND=-Dkeycloak.migration.replace-placeholders=true
    volumes:
      - ./AuthGuard/keycloak:/opt/keycloak/data/import
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
    networks:
      - authguard-network
    profiles:
      - prod
      - dev
      - local

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - authguard-network
    profiles:
      - prod
      - dev
      - local

networks:
  authguard-network:
    driver: bridge