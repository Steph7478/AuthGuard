services:
  authguard:
    build: .
    container_name: authguard
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      - PORT=${PORT:-3000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWKS_URL=${JWKS_URL:-http://keycloak:8080/realms/authguard/protocol/openid-connect/certs}
      - TARGET_SERVICE=${TARGET_SERVICE:-http://target_service:4000}
      - RATE_LIMIT=${RATE_LIMIT:-100}
      - WINDOW_SECONDS=${WINDOW_SECONDS:-60}
    volumes:
      - ./config.json:/app/config.json
    networks:
      - authguard

  service:
    image: node:18-alpine
    container_name: target_service
    command: >
      sh -c "echo 'const http = require(\"http\");
      http.createServer((req, res) => {
        console.log(\"Headers:\", JSON.stringify(req.headers, null, 2));
        res.end(\"OK\");
      }).listen(4000);' > server.js && node server.js"
    networks:
      - authguard

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: keycloak_auth
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - JAVA_OPTS_APPEND=-Dkeycloak.migration.replace-placeholders=true
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    networks:
      - authguard

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - authguard

networks:
  authguard:
    driver: bridge