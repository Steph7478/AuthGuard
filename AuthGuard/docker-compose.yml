services:
  authguard:
    build: .
    container_name: authguard
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWKS_URL=http://keycloak:8080/realms/master/protocol/openid-connect/certs
      - TARGET_SERVICE=http://service:4000
      - RATE_LIMIT=100
      - WINDOW_SECONDS=60
    networks:
      - authguard

  service:
    image: node:18-alpine
    container_name: target_service
    networks:
      - authguard

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - authguard

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_auth
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./AuthGuard/keycloak:/opt/keycloak/data/import/
    ports:
      - "8080:8080"
    networks:
      - authguard

networks:
  authguard:
    driver: bridge