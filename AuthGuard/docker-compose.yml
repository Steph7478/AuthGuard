services:
  authguard:
    build: .
    container_name: authguard
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWKS_URL=http://keycloak:8080/realms/authguard/protocol/openid-connect/certs
      - TARGET_SERVICE=http://target_service:4000
      - RATE_LIMIT=100
      - WINDOW_SECONDS=60
    volumes:
      - ./config.json:/app/config.json
    networks:
      - authguard

  service:
    image: node:18-alpine
    container_name: target_service
    command: >
      sh -c "echo 'const http = require(\"http\");
      http.createServer((req, res) => {
        console.log(\"Headers:\", JSON.stringify(req.headers, null, 2));
        res.end(\"OK\");
      }).listen(4000);' > server.js && node server.js"
    networks:
      - authguard

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_auth
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_RELATIVE_PATH=/
      - KC_ADMIN_PASSWORD=admin
      - KC_COST_CENTER=INFRA-002
      - KC_GROUP=/TI/Infraestrutura
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=teste
      - SMTP_PASSWORD=teste
    volumes:
      - ./AuthGuard/keycloak:/opt/keycloak/data/import/
    ports:
      - "8080:8080"
    networks:
      - authguard

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - authguard

  tester:
    image: alpine:latest
    container_name: tester_bot
    networks:
      - authguard
    depends_on:
      authguard:
        condition: service_started
    entrypoint: ["sh", "-c", "apk add --no-cache curl && tail -f /dev/null"]

networks:
  authguard:
    driver: bridge
