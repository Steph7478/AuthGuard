server {
    listen 80;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /login {
        return 302 /auth/realms/authguard/protocol/openid-connect/auth?client_id=authguard-service&response_type=code&scope=openid%20profile%20email&redirect_uri=$scheme://$host/callback;
    }

    location = /login/google {
        return 302 /auth/realms/authguard/protocol/openid-connect/auth?client_id=authguard-service&response_type=code&scope=openid%20profile%20email&redirect_uri=$scheme://$host/callback&kc_idp_hint=google;
    }

    location = /callback {
        proxy_pass http://authguard_upstream/callback;
    }

    location = /metrics {
        proxy_pass http://authguard_upstream/metrics;
    }

    location = /health {
        proxy_pass http://authguard_upstream/health;
    }

    location /auth/ {
        proxy_pass http://keycloak_upstream/auth/;
    }

    location = /validate {
        proxy_pass http://authguard_upstream/validate;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    location = /_validate {
        internal;
        limit_req zone=validate burst=10;

        proxy_pass http://authguard_upstream/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;

        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location ~ ^/api/(.*) {
        limit_req zone=api burst=20;
        auth_request /_validate;

        auth_request_set $auth_status $upstream_status;
        error_page 503 = @service_unavailable;

        proxy_pass http://user_service_upstream/$1$is_args$args;
        proxy_set_header Authorization $http_authorization;
    }

    location @service_unavailable {
        default_type application/json;
        return 503 "{\"error\":\"service_unavailable\",\"message\":\"Authentication service temporarily unavailable. Please try again later.\"}";
    }
}