upstream authguard_upstream {
    server authguard:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream user_service_upstream {
    server user_service:4001 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream keycloak_upstream {
    server keycloak:8080 max_fails=5 fail_timeout=60s;
    keepalive 64;
    keepalive_requests 500;
    keepalive_timeout 30s;
}