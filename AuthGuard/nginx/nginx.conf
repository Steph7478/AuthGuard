events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=validate:10m rate=30r/s;

    upstream authguard_upstream {
        server authguard:3000;
    }

    upstream user_service_upstream {
        server user_service:4001;
    }

    upstream keycloak_upstream {
        server keycloak_auth:8080;
    }

    server {
        listen 80;

        location = /login {
            return 302 /auth/realms/authguard/protocol/openid-connect/auth?client_id=authguard-service&response_type=code&scope=openid%20profile%20email&redirect_uri=$scheme://$host/callback;
        }

        location = /login/google {
            return 302 /auth/realms/authguard/protocol/openid-connect/auth?client_id=authguard-service&response_type=code&scope=openid%20profile%20email&redirect_uri=$scheme://$host/callback&kc_idp_hint=google;
        }

        location = /callback {
            proxy_pass http://authguard_upstream/callback;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /validate {
            proxy_pass http://authguard_upstream/validate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
        }

        location = /metrics {
            proxy_pass http://authguard_upstream/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /health {
            proxy_pass http://authguard_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /auth/ {
            proxy_pass http://keycloak_upstream/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /_validate {
            internal;
            limit_req zone=validate burst=10;
            proxy_pass http://authguard_upstream/validate;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location ~ ^/api/(.*) {
            limit_req zone=api burst=20;
            auth_request /_validate;

            proxy_pass http://user_service_upstream/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }
    }
}